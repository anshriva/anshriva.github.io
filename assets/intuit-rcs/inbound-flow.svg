<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="'DM Sans', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="600" fill="#ffffff"/>

  <!-- User device -->
  <rect x="30" y="240" width="150" height="100" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="105" y="285" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">User device</text>
  <text x="105" y="307" text-anchor="middle" font-size="12.5" fill="#64748b">reply, button tap,</text>
  <text x="105" y="323" text-anchor="middle" font-size="12.5" fill="#64748b">image attachment</text>

  <!-- Vendor -->
  <rect x="220" y="240" width="150" height="100" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="295" y="285" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">SMS / RCS vendor</text>
  <text x="295" y="307" text-anchor="middle" font-size="12.5" fill="#64748b">forwards inbound</text>
  <text x="295" y="323" text-anchor="middle" font-size="12.5" fill="#64748b">via webhook</text>

  <!-- Inbound platform service -->
  <rect x="410" y="215" width="200" height="150" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="510" y="245" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Inbound platform service</text>
  <line x1="430" y1="258" x2="590" y2="258" stroke="#1d4ed8" stroke-width="1" opacity="0.3"/>
  <text x="510" y="282" text-anchor="middle" font-size="12.5" fill="#334155">• parse vendor payload</text>
  <text x="510" y="302" text-anchor="middle" font-size="12.5" fill="#334155">• capture consent (STOP)</text>
  <text x="510" y="322" text-anchor="middle" font-size="12.5" fill="#334155">• re-host media</text>
  <text x="510" y="342" text-anchor="middle" font-size="12.5" fill="#334155">• publish to shared topic</text>

  <!-- Internal blob storage (above the service, shifted left so arrow runs alongside the label) -->
  <g>
    <path d="M380,80 v45 a30,10 0 0 0 60,0 v-45" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
    <ellipse cx="410" cy="80" rx="30" ry="10" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
  </g>
  <text x="410" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Internal blob storage</text>
  <text x="410" y="173" text-anchor="middle" font-size="11.5" fill="#64748b">(re-hosted media)</text>

  <!-- Shared inbound topic -->
  <g>
    <rect x="660" y="225" width="190" height="60" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
    <text x="755" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Shared inbound topic</text>
    <text x="755" y="268" text-anchor="middle" font-size="12" fill="#475569">every reply, every sender</text>
  </g>

  <!-- Broker / routing rule -->
  <rect x="660" y="305" width="190" height="80" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="755" y="328" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Message broker</text>
  <text x="755" y="349" text-anchor="middle" font-size="11.5" fill="#475569">header-based routing</text>
  <text x="755" y="367" text-anchor="middle" font-size="11.5" fill="#475569">filter:  to = &lt;sender id&gt;</text>

  <!-- Per-consumer topics (three, on the right) -->
  <g>
    <rect x="890" y="140" width="130" height="55" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
    <text x="955" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Consumer A</text>
    <text x="955" y="180" text-anchor="middle" font-size="11.5" fill="#475569">topic · own traffic</text>
  </g>

  <g>
    <rect x="890" y="275" width="130" height="55" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
    <text x="955" y="297" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Consumer B</text>
    <text x="955" y="315" text-anchor="middle" font-size="11.5" fill="#475569">topic · own traffic</text>
  </g>

  <g>
    <rect x="890" y="410" width="130" height="55" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
    <text x="955" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Consumer C</text>
    <text x="955" y="450" text-anchor="middle" font-size="11.5" fill="#475569">topic · own traffic</text>
  </g>

  <!-- Arrows -->
  <!-- user -> vendor -->
  <line x1="180" y1="290" x2="215" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- vendor -> inbound service -->
  <line x1="370" y1="290" x2="405" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- inbound service -> blob storage (upload arc that clears the blob label) -->
  <path d="M430,215 Q420,170 410,135" fill="none" stroke="#b45309" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="362" y="200" text-anchor="end" font-size="11.5" fill="#b45309">upload</text>

  <!-- inbound service -> shared topic -->
  <line x1="610" y1="255" x2="655" y2="255" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- shared topic -> broker routing (vertical connector, visually nested) -->
  <line x1="755" y1="285" x2="755" y2="305" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- broker -> consumer A -->
  <path d="M850,330 Q870,330 880,255 Q885,200 888,170" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- broker -> consumer B -->
  <line x1="850" y1="345" x2="888" y2="302" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- broker -> consumer C -->
  <path d="M850,360 Q870,360 880,395 Q885,420 888,437" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- (no per-arrow labels; the filter rule is shown once inside the broker box) -->

  <!-- Footer caption strip -->
  <line x1="60" y1="510" x2="980" y2="510" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="535" font-size="12" fill="#475569" font-weight="600">Key idea:</text>
  <text x="60" y="555" font-size="12" fill="#475569">platform publishes once; broker fans out by header. New consumers onboard via a topic and a routing rule — no platform code change.</text>
</svg>
