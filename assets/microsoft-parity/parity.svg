<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="'DM Sans', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="640" fill="#ffffff"/>

  <!-- Cloud orchestration -->
  <rect x="90" y="50" width="320" height="110" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="250" y="98" text-anchor="middle" font-size="19" font-weight="600" fill="#0f172a">Cloud orchestration</text>
  <text x="250" y="124" text-anchor="middle" font-size="13" fill="#64748b">scheduling &amp; config in Microsoft's cloud</text>

  <!-- On-prem agent -->
  <rect x="570" y="50" width="320" height="110" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="730" y="92" text-anchor="middle" font-size="19" font-weight="600" fill="#0f172a">On-prem agent</text>
  <text x="730" y="116" text-anchor="middle" font-size="13" fill="#64748b">Windows background process,</text>
  <text x="730" y="134" text-anchor="middle" font-size="13" fill="#64748b">inside the customer network</text>

  <!-- divider label between the two orchestrations -->
  <text x="490" y="100" text-anchor="middle" font-size="12.5" fill="#b45309">only this layer</text>
  <text x="490" y="118" text-anchor="middle" font-size="12.5" fill="#b45309">differs</text>

  <!-- Shared connector core -->
  <rect x="200" y="270" width="580" height="170" rx="16" fill="#eff6ff" stroke="#334155" stroke-width="2.5"/>
  <text x="490" y="308" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Shared connector core</text>
  <text x="490" y="330" text-anchor="middle" font-size="13" fill="#475569">written once · runs in either home</text>

  <rect x="230" y="352" width="160" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="310" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Connector logic</text>
  <text x="310" y="399" text-anchor="middle" font-size="11.5" fill="#64748b">per-source crawl</text>

  <rect x="410" y="352" width="160" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="490" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Crawl lifecycle</text>
  <text x="490" y="399" text-anchor="middle" font-size="11.5" fill="#64748b">checkpoint / resume</text>

  <rect x="590" y="352" width="160" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="670" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Item + ACL model</text>
  <text x="670" y="399" text-anchor="middle" font-size="11.5" fill="#64748b">the data contract</text>

  <!-- Microsoft index -->
  <rect x="345" y="540" width="290" height="80" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="490" y="586" text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a">Microsoft index</text>

  <!-- Cloud orchestration -> core -->
  <line x1="250" y1="160" x2="330" y2="268" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- On-prem agent -> core -->
  <line x1="730" y1="160" x2="650" y2="268" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- core -> index -->
  <line x1="490" y1="440" x2="490" y2="538" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="505" y="495" text-anchor="start" font-size="13" fill="#334155">indexed items</text>
</svg>
