<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="'DM Sans', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="700" fill="#ffffff"/>

  <!-- Notification Tray service -->
  <rect x="60" y="60" width="220" height="120" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="170" y="115" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Notification Tray</text>
  <text x="170" y="142" text-anchor="middle" font-size="13" fill="#64748b">shared in-product inbox</text>

  <!-- Cassandra (vertical cylinder) -->
  <g>
    <path d="M765,90 v100 a55,16 0 0 0 110,0 v-100" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
    <ellipse cx="820" cy="90" rx="55" ry="16" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <path d="M765,123 a55,16 0 0 0 110,0 M765,156 a55,16 0 0 0 110,0" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="820" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Cassandra</text>
  <text x="820" y="270" text-anchor="middle" font-size="12.5" fill="#475569">US West + US East · DataStax Enterprise</text>
  <text x="820" y="288" text-anchor="middle" font-size="12.5" fill="#b45309">self-managed on EC2</text>

  <!-- In-session engagement service (horizontal cylinder / stream) -->
  <g>
    <path d="M590,360 h150 M590,430 h150" stroke="#15803d" stroke-width="2"/>
    <path d="M590,360 a16,35 0 0 0 0,70" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <path d="M740,360 a16,35 0 0 1 0,70" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <rect x="590" y="360" width="150" height="70" fill="#dcfce7" opacity="0.5"/>
    <ellipse cx="590" cy="395" rx="16" ry="35" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="668" y="478" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">In-session engagement service</text>
  <text x="668" y="498" text-anchor="middle" font-size="12.5" fill="#475569">real-time delivery stream</text>

  <!-- Users -->
  <rect x="70" y="560" width="200" height="90" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="170" y="612" text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a">Users</text>

  <!-- Tray -> Cassandra : CRUD -->
  <line x1="280" y1="115" x2="755" y2="115" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="103" text-anchor="middle" font-size="14" fill="#334155">CRUD</text>

  <!-- Tray -> engagement : publish -->
  <line x1="260" y1="180" x2="575" y2="372" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="262" text-anchor="middle" font-size="14" fill="#334155">publish</text>

  <!-- Users -> Tray : fetch messages (pull) -->
  <line x1="160" y1="560" x2="160" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="148" y="375" text-anchor="end" font-size="14" fill="#334155">fetch messages</text>
  <text x="148" y="393" text-anchor="end" font-size="12" fill="#64748b">(pull / history)</text>

  <!-- Users -> engagement : WebSocket (push) -->
  <line x1="270" y1="595" x2="585" y2="425" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="538" text-anchor="middle" font-size="14" fill="#334155">WebSocket</text>
  <text x="430" y="556" text-anchor="middle" font-size="12" fill="#64748b">(real-time push)</text>
</svg>
