<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="'DM Sans', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="660" fill="#ffffff"/>

  <!-- Upstream clients -->
  <rect x="340" y="40" width="300" height="80" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="490" y="78" text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a">Upstream clients</text>
  <text x="490" y="100" text-anchor="middle" font-size="13" fill="#64748b">bus search request</text>

  <!-- request arrow -->
  <line x1="490" y1="120" x2="490" y2="168" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Aggregation service -->
  <rect x="120" y="170" width="740" height="240" rx="16" fill="#eff6ff" stroke="#334155" stroke-width="2.5"/>
  <text x="490" y="206" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">In-house aggregation service (Java)</text>
  <text x="490" y="228" text-anchor="middle" font-size="13" fill="#475569">fan out · merge · one common vendor interface</text>

  <!-- Adapter A -->
  <rect x="180" y="262" width="270" height="116" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="315" y="294" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Adapter A</text>
  <text x="315" y="315" text-anchor="middle" font-size="11.5" fill="#64748b">implements the interface</text>
  <text x="315" y="349" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Hystrix breaker: closed</text>
  <text x="315" y="366" text-anchor="middle" font-size="11" fill="#64748b">vendor healthy · calls pass</text>

  <!-- Adapter B -->
  <rect x="530" y="262" width="270" height="116" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="665" y="294" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Adapter B</text>
  <text x="665" y="315" text-anchor="middle" font-size="11.5" fill="#64748b">implements the interface</text>
  <text x="665" y="349" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">Hystrix breaker: open</text>
  <text x="665" y="366" text-anchor="middle" font-size="11" fill="#64748b">vendor failing · short-circuited</text>

  <!-- new vendor note -->
  <text x="490" y="398" text-anchor="middle" font-size="12" fill="#475569">a new vendor onboards by implementing the same interface and registering — no service change</text>

  <!-- Vendor 1 -->
  <rect x="180" y="500" width="270" height="80" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="315" y="538" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Vendor 1</text>
  <text x="315" y="560" text-anchor="middle" font-size="12" fill="#64748b">responding normally</text>

  <!-- Vendor 2 -->
  <rect x="530" y="500" width="270" height="80" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="665" y="538" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Vendor 2</text>
  <text x="665" y="560" text-anchor="middle" font-size="12" fill="#b45309">down / slow — skipped</text>

  <!-- Adapter A -> Vendor 1 -->
  <line x1="315" y1="378" x2="315" y2="498" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Adapter B -> Vendor 2 (broken / dashed) -->
  <line x1="665" y1="378" x2="665" y2="498" stroke="#b45309" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="700" y="445" text-anchor="start" font-size="12" fill="#b45309">breaker open</text>
</svg>
